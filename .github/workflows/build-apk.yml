name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: android-project
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbuZahra-APK
          path: android-project/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: أبو الزهراء APK v1.0.${{ github.run_number }}
          body: |
            ## 📱 أبو الزهراء للاندرويد
            
            تطبيق للتحكم عن بعد بالأجهزة.
            
            ### 🔧 التثبيت:
            1. حمّل ملف APK
            2. فعّل "تثبيت من مصادر غير معروفة" في الإعدادات
            3. افتح ملف APK للتثبيت
            
            ### ⚠️ الصلاحيات:
            - إنترنت وشبكة
            - موقع (GPS)
            - كاميرا وميكروفون
            - جهات اتصال
            - رسائل ومكالمات
            - تخزين
            
            Commit: ${{ github.sha }}
          files: android-project/app/build/outputs/apk/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
