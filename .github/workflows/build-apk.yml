name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Accept Android Licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>/dev/null || true

      - name: 📦 Make Gradlew Executable
        run: chmod +x android-project/gradlew

      - name: 🔨 Build Debug APK
        working-directory: android-project
        run: |
          echo "Building APK..."
          ./gradlew clean assembleDebug --no-daemon --stacktrace
        continue-on-error: false

      - name: 📁 Find APK Files
        run: |
          echo "Looking for APK files..."
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found with find"
          ls -la android-project/app/build/outputs/apk/debug/ 2>/dev/null || echo "Checking alternative locations..."
          ls -la android-project/app/build/outputs/ 2>/dev/null || true

      - name: 📊 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbuZahra-APK
          path: |
            android-project/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

  create-release:
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: AbuZahra-APK
          path: ./apk

      - name: 📋 List Downloaded Files
        run: ls -la ./apk 2>/dev/null || echo "No files found"

      - name: 📦 Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: أبو الزهراء - Abu Zahra v1.0.0
          body: |
            ## 🏗️ Build Information
            - **Commit:** ${{ github.sha }}
            - **Date:** ${{ github.event.head_commit.timestamp }}
            
            ## 📱 Installation Instructions
            1. Download the APK file
            2. Enable "Install from Unknown Sources" in Android Settings > Security
            3. Open the APK file to install
            
            ## ⚠️ Required Permissions
            - Internet & Network
            - Location (GPS)
            - Camera & Microphone
            - Contacts
            - SMS & Phone
            - Storage
            
            ## 🔧 First Time Setup
            1. Open the app
            2. Enter your server URL
            3. Connect and start managing devices!
          files: ./apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
