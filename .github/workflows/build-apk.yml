name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Accept Android Licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>/dev/null || true

      - name: 📦 Download Gradle Wrapper JAR
        working-directory: android-project
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar

      - name: 📦 Make Gradlew Executable
        run: chmod +x android-project/gradlew

      - name: 🔨 Build Debug APK
        working-directory: android-project
        run: |
          ./gradlew assembleDebug --no-daemon --info 2>&1 | head -100 || ./gradlew assembleDebug --stacktrace

      - name: 📁 List APK Files
        run: find android-project -name "*.apk" -type f 2>/dev/null || echo "Searching..."

      - name: 📊 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbuZahra-APK
          path: android-project/app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn

  create-release:
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: AbuZahra-APK
          path: ./apk

      - name: 📋 List APK Files
        run: ls -la ./apk 2>/dev/null || echo "No files"

      - name: 📦 Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0-build${{ github.run_number }}
          name: أبو الزهراء - Abu Zahra APK
          body: |
            ## 📱 Android APK
            تطبيق أبو الزهراء للتحكم عن بعد بالأجهزة
            
            ## 🔧 التثبيت
            1. حمل ملف APK
            2. فعّل "تثبيت من مصادر غير معروفة" في الإعدادات
            3. افتح الملف للتثبيت
            
            ## 📅 معلومات البناء
            - Commit: ${{ github.sha }}
            - Date: ${{ github.event.head_commit.timestamp }}
          files: ./apk/*.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
