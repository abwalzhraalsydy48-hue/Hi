name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install Dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build Web App
        run: bun run build

  build-apk:
    needs: build-web
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Make Gradlew Executable
        run: chmod +x android-project/gradlew 2>/dev/null || true

      - name: 🔨 Build Debug APK
        working-directory: android-project
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace || true
        continue-on-error: true

      - name: 📁 List Build Outputs
        run: |
          find android-project -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -la android-project/app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK directory"

      - name: 📊 Upload APK Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: abu-zahra-apk
          path: |
            android-project/app/build/outputs/apk/**/*.apk
            android-project/**/*.apk
          retention-days: 30
          if-no-files-found: ignore

  create-release:
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: abu-zahra-apk
          path: ./apk
        continue-on-error: true

      - name: 📦 Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: أبو الزهراء v1.0.${{ github.run_number }}
          body: |
            ## 🏗️ Build Information
            - **Commit:** ${{ github.sha }}
            - **Branch:** ${{ github.ref_name }}
            - **Date:** ${{ github.event.head_commit.timestamp }}
            
            ## 📱 Installation
            1. Download the APK file
            2. Enable "Install from Unknown Sources" in your Android settings
            3. Open the APK file to install
            
            ## ⚠️ Permissions Required
            - Location (GPS)
            - Camera
            - Microphone
            - Contacts
            - SMS
            - Phone
            - Storage
          files: |
            ./apk/**/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: [build-web, build-apk, create-release]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: ✅ Build Summary
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Step |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ needs.build-web.result == 'success' && '✅' || '❌' }} | Web Build |" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ needs.build-apk.result == 'success' && '✅' || '⚠️' }} | APK Build |" >> $GITHUB_STEP_SUMMARY
          echo "| ${{ needs.create-release.result == 'success' && '✅' || '⚠️' }} | Release |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date)" >> $GITHUB_STEP_SUMMARY
