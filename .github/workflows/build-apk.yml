name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🔨 Build Debug APK
        working-directory: android-project
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 || true
          
      - name: 📁 Find APK Files
        run: |
          echo "Searching for APK files..."
          find . -name "*.apk" 2>/dev/null
          
          # Create output directory
          mkdir -p output-apk
          
          # Copy any APK found
          for apk in $(find . -name "*.apk" 2>/dev/null); do
            echo "Found: $apk"
            cp "$apk" output-apk/
          done
          
          ls -la output-apk/

      - name: 📊 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AbuZahra-APK
          path: output-apk/*.apk
          retention-days: 30
          if-no-files-found: warn

  release:
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: AbuZahra-APK
          path: ./apk
        continue-on-error: true

      - name: 📋 List Files
        run: ls -la ./apk/ 2>/dev/null || echo "No APK found"

      - name: 📦 Create Release
        uses: softprops/action-gh-release@v1
        if: hashFiles('./apk/*.apk') != ''
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: أبو الزهراء APK v1.0.${{ github.run_number }}
          body: |
            ## 📱 تطبيق أبو الزهراء للاندرويد
            
            ### 🔧 التثبيت:
            1. حمّل ملف APK
            2. فعّل "مصادر غير معروفة" في الإعدادات
            3. افتح الملف للتثبيت
            
            ### 📅 معلومات:
            - Commit: ${{ github.sha }}
            - Date: ${{ github.event.head_commit.timestamp }}
          files: ./apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
