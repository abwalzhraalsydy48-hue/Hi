name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: android-project
        run: chmod +x gradlew

      - name: Build with Gradle
        working-directory: android-project
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android-project/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-debug
          path: ./apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: أبو الزهراء APK
          body: |
            ## 📱 تطبيق أبو الزهراء للاندرويد
            
            تطبيق للتحكم عن بعد بالأجهزة.
            
            ### 🔧 التثبيت:
            1. حمّل ملف APK
            2. فعّل "تثبيت من مصادر غير معروفة"
            3. افتح الملف للتثبيت
          files: ./apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
