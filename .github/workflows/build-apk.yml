name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: 🔨 Build Debug APK
        working-directory: android-project
        run: |
          chmod +x gradlew
          echo "=== Building APK ==="
          ./gradlew assembleDebug --no-daemon --stacktrace
          echo "=== Build completed ==="

      - name: 📁 Debug - Show All Files
        run: |
          echo "=== Listing all files in project ==="
          ls -la android-project/
          echo "=== Listing app/build ==="
          ls -laR android-project/app/build/ 2>/dev/null || echo "No build directory"
          echo "=== Finding all APK files ==="
          find . -name "*.apk" -type f -ls 2>/dev/null || echo "No APK files found"

      - name: 📦 Prepare APK for Upload
        run: |
          mkdir -p output-apk
          
          # Try multiple locations
          for pattern in \
            "android-project/app/build/outputs/apk/debug/*.apk" \
            "android-project/app/build/outputs/apk/*.apk" \
            "android-project/**/build/outputs/**/*.apk" \
            "**/*.apk"
          do
            echo "Searching: $pattern"
            for file in $pattern; do
              if [ -f "$file" ]; then
                echo "Found APK: $file"
                cp "$file" output-apk/
              fi
            done
          done
          
          echo "=== Files in output-apk ==="
          ls -la output-apk/
          
          # Check if we have any APK
          APK_COUNT=$(ls -1 output-apk/*.apk 2>/dev/null | wc -l)
          echo "APK Count: $APK_COUNT"
          
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "⚠️ No APK files found to upload"
          fi

      - name: 📊 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbuZahra-APK
          path: output-apk/
          retention-days: 30
          if-no-files-found: warn

  release:
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: AbuZahra-APK
          path: ./apk
        continue-on-error: true

      - name: 📋 List Downloaded Files
        id: check-apk
        run: |
          ls -la ./apk/ 2>/dev/null || echo "No APK directory"
          APK_COUNT=$(ls -1 ./apk/*.apk 2>/dev/null | wc -l || echo "0")
          echo "apk_count=$APK_COUNT" >> $GITHUB_OUTPUT
          echo "APK files found: $APK_COUNT"

      - name: 📦 Create Release
        if: steps.check-apk.outputs.apk_count > 0
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: أبو الزهراء APK v1.0.${{ github.run_number }}
          body: |
            ## 📱 تطبيق أبو الزهراء للاندرويد
            
            تطبيق للتحكم عن بعد بالأجهزة عبر لوحة تحكم متكاملة.
            
            ### 🔧 التثبيت:
            1. حمّل ملف APK
            2. فعّل "تثبيت من مصادر غير معروفة" في الإعدادات
            3. افتح ملف APK للتثبيت
            
            ### 📅 معلومات البناء:
            - Commit: ${{ github.sha }}
            - التاريخ: ${{ github.event.head_commit.timestamp }}
          files: ./apk/*.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚠️ No APK Warning
        if: steps.check-apk.outputs.apk_count == 0
        run: |
          echo "No APK files were found. The build may have failed silently."
          echo "Check the build logs for more details."
