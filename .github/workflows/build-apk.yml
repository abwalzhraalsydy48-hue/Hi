name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: 📱 Setup Android SDK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-33" "build-tools;33.0.0" 2>/dev/null || true

      - name: 🔨 Build Debug APK
        working-directory: android-project
        run: |
          chmod +x gradlew || true
          ./gradlew assembleDebug --stacktrace

      - name: 📁 Find APK Files
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          mkdir -p output-apk
          find . -name "*.apk" -exec cp {} output-apk/ \; 2>/dev/null || true
          ls -la output-apk/

      - name: 📊 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AbuZahra-APK
          path: output-apk/*.apk
          retention-days: 30
          if-no-files-found: warn

  release:
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: AbuZahra-APK
          path: ./apk
        continue-on-error: true

      - name: 📦 Create Release
        uses: softprops/action-gh-release@v1
        if: hashFiles('./apk/*.apk') != ''
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: أبو الزهراء APK v1.0.${{ github.run_number }}
          body: |
            ## 📱 تطبيق أبو الزهراء للاندرويد
            
            ### 🔧 التثبيت:
            1. حمّل ملف APK
            2. فعّل "تثبيت من مصادر غير معروفة"
            3. افتح الملف للتثبيت
            
            ### 📅 معلومات:
            - Commit: ${{ github.sha }}
          files: ./apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
