name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Create launcher icons
        run: |
          # Create mipmap directories
          mkdir -p android-project/app/src/main/res/mipmap-hdpi
          mkdir -p android-project/app/src/main/res/mipmap-mdpi
          mkdir -p android-project/app/src/main/res/mipmap-xhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxhdpi
          mkdir -p android-project/app/src/main/res/mipmap-xxxhdpi
          mkdir -p android-project/app/src/main/res/mipmap-anydpi-v26
          
          # Create adaptive icon foreground
          cat > android-project/app/src/main/res/drawable/ic_launcher_foreground.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#DC2626"
                  android:pathData="M54,54m-40,0a40,40 0,1 1,80 0a40,40 0,1 1,-80 0"/>
              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M54,30L54,78M30,54L78,54"
                  android:strokeWidth="6"
                  android:strokeColor="#FFFFFF"/>
          </vector>
          EOF
          
          # Create adaptive icon background
          cat > android-project/app/src/main/res/drawable/ic_launcher_background.xml << 'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">
              <path
                  android:fillColor="#0f172a"
                  android:pathData="M0,0h108v108h-108z"/>
          </vector>
          EOF
          
          # Create adaptive icon
          cat > android-project/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          cat > android-project/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@drawable/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF
          
          # Create simple PNG icons for older devices (using XML shapes)
          for size in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            cat > android-project/app/src/main/res/mipmap-$size/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="rectangle">
              <solid android:color="#0f172a"/>
              <corners android:radius="8dp"/>
          </shape>
          EOF
            cat > android-project/app/src/main/res/mipmap-$size/ic_launcher_round.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="oval">
              <solid android:color="#0f172a"/>
          </shape>
          EOF
          done

      - name: Make Gradle executable
        run: chmod +x android-project/gradlew

      - name: Build APK with Gradle
        working-directory: android-project
        run: |
          ./gradlew clean
          ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          APK_PATH="android-project/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            mv "$APK_PATH" "abu-zahra-server.apk"
            echo "APK created successfully!"
            ls -la abu-zahra-server.apk
          else
            echo "APK not found at expected path"
            find android-project -name "*.apk" 2>/dev/null
            exit 1
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: abu-zahra-server-apk
          path: abu-zahra-server.apk
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release Build ${{ github.run_number }}
          files: abu-zahra-server.apk
          body: |
            ## أبو الزهراء - APK Release
            
            تاريخ البناء: ${{ github.event.head_commit.timestamp }}
            رقم الإصدار: ${{ github.run_number }}
            
            ### طريقة التثبيت:
            1. حمل ملف APK
            2. فعّل "التثبيت من مصادر غير معروفة" في إعدادات الهاتف
            3. افتح ملف APK للتثبيت
            
            ### ملاحظة:
            هذا التطبيق يعمل كـ WebView للوحة التحكم. أدخل رابط الخادم في التطبيق للاتصال.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
