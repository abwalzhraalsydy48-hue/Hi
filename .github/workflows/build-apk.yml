name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Accept Android Licenses
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" 2>/dev/null || true

      - name: 📦 Setup Gradle Wrapper
        working-directory: android-project
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: 🔨 Build Debug APK
        working-directory: android-project
        run: ./gradlew assembleDebug --no-daemon

      - name: 📁 Find and List APK Files
        run: |
          echo "=== Looking for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Checking build output directory ==="
          ls -la android-project/app/build/outputs/apk/debug/ 2>/dev/null || true
          echo "=== Creating APK directory ==="
          mkdir -p output-apk
          cp android-project/app/build/outputs/apk/debug/*.apk output-apk/ 2>/dev/null || true
          ls -la output-apk/ 2>/dev/null || true

      - name: 📊 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AbuZahra-APK
          path: output-apk/*.apk
          retention-days: 30
          if-no-files-found: error

  create-release:
    needs: build-apk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: AbuZahra-APK
          path: ./apk

      - name: 📋 List APK Files
        run: ls -la ./apk/

      - name: 📦 Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: أبو الزهراء - Abu Zahra v1.0.${{ github.run_number }}
          body: |
            ## 📱 تطبيق أبو الزهراء للاندرويد
            
            ### 🔧 طريقة التثبيت:
            1. حمل ملف APK
            2. افتح الإعدادات > الأمان
            3. فعّل "مصادر غير معروفة"
            4. افتح ملف APK للتثبيت
            
            ### ⚠️ الصلاحيات المطلوبة:
            - الإنترنت والشبكة
            - الموقع (GPS)
            - الكاميرا والميكروفون
            - جهات الاتصال
            - الرسائل والمكالمات
            - التخزين
            
            ### 📅 معلومات البناء:
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
          files: ./apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
